services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: icedata
      POSTGRES_PASSWORD: icedata
      POSTGRES_DB: ice_data_forge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icedata -d ice_data_forge"]
      interval: 5s
      timeout: 5s
      retries: 5

  ice-data-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://icedata:icedata@postgres:5432/ice_data_forge
      HOST: 0.0.0.0
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:-change-me-n8n-secret}
    depends_on:
      postgres:
        condition: service_healthy

  ice-data-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: mcp
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://icedata:icedata@postgres:5432/ice_data_forge
      MCP_ADDR: 0.0.0.0:3001
      MCP_API_KEY: ${MCP_API_KEY:-dev-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
    depends_on:
      postgres:
        condition: service_healthy

  ice-data-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      ice-data-api:
        condition: service_started

  ice-data-bot:
    build:
      context: ./chatbot
      dockerfile: Dockerfile
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-}
      API_BASE_URL: http://ice-data-api:8080/v1
      API_KEY: ${API_KEY:-dev-key}
    depends_on:
      ice-data-api:
        condition: service_started

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_DATABASE_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ice_data_forge
      DB_POSTGRESDB_USER: icedata
      DB_POSTGRESDB_PASSWORD: icedata
      N8N_METRICS: "false"
      # Env vars used by n8n workflows via $env.VAR_NAME
      API_BASE_URL: http://ice-data-api:8080/v1
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:-change-me-n8n-secret}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n:/home/node/n8n-workflows

volumes:
  pgdata:
  n8n_data:
