name: Deploy to Docker Hub

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag"
        required: false
        default: "latest"

env:
  DOCKER_HUB_USER: icedataforge
  TAG: ${{ github.ref_type == 'tag' && github.ref_name || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag || 'latest') }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.75"
      - run: cargo check --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace

  build-api:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: api
          tags: |
            ${{ env.DOCKER_HUB_USER }}/ice-data-api:${{ env.TAG }}
            ${{ env.DOCKER_HUB_USER }}/ice-data-api:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-mcp:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: mcp
          tags: |
            ${{ env.DOCKER_HUB_USER }}/ice-data-mcp:${{ env.TAG }}
            ${{ env.DOCKER_HUB_USER }}/ice-data-mcp:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-bot:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: chatbot
          file: chatbot/Dockerfile
          tags: |
            ${{ env.DOCKER_HUB_USER }}/ice-data-bot:${{ env.TAG }}
            ${{ env.DOCKER_HUB_USER }}/ice-data-bot:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dashboard:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: dashboard
          file: dashboard/Dockerfile
          tags: |
            ${{ env.DOCKER_HUB_USER }}/ice-data-dashboard:${{ env.TAG }}
            ${{ env.DOCKER_HUB_USER }}/ice-data-dashboard:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-api, build-mcp, build-bot, build-dashboard]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.SSH_PATH }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
