services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-icedata}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?must be set in production}
      POSTGRES_DB: ${POSTGRES_DB:-ice_data_forge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-icedata} -d ${POSTGRES_DB:-ice_data_forge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  ice-data-api:
    image: ${DOCKER_HUB_USER:-icedataforge}/ice-data-api:${TAG:-latest}
    pull_policy: always
    restart: always
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-icedata}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-ice_data_forge}
      HOST: 0.0.0.0
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:?must be set in production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:?must be set in production}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  ice-data-mcp:
    image: ${DOCKER_HUB_USER:-icedataforge}/ice-data-mcp:${TAG:-latest}
    pull_policy: always
    restart: always
    ports:
      - "${MCP_PORT:-3001}:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-icedata}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-ice_data_forge}
      MCP_ADDR: 0.0.0.0:3001
      MCP_API_KEY: ${MCP_API_KEY:?must be set in production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  ice-data-bot:
    image: ${DOCKER_HUB_USER:-icedataforge}/ice-data-bot:${TAG:-latest}
    pull_policy: always
    restart: always
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?must be set in production}
      API_BASE_URL: http://ice-data-api:8080/v1
      API_KEY: ${API_KEY:-dev-key}
    depends_on:
      ice-data-api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  ice-data-dashboard:
    image: ${DOCKER_HUB_USER:-icedataforge}/ice-data-dashboard:${TAG:-latest}
    pull_policy: always
    restart: always
    ports:
      - "${DASHBOARD_PORT:-80}:80"
    depends_on:
      ice-data-api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_DATABASE_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-ice_data_forge}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-icedata}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?}
      N8N_METRICS: "false"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?must be set in production}
      API_BASE_URL: http://ice-data-api:8080/v1
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:?}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n:/home/node/n8n-workflows
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

volumes:
  pgdata:
  n8n_data:
